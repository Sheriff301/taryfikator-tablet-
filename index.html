<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MDT - Los Santos / Los Angeles</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0b0c10;
            color: #fff;
            font-family: 'Arial', sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }
        /* Główny kontener na treść (lewa strona) */
        .main-container {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
            background: #0f1115;
        }
        /* Menu boczne (prawa strona) */
        .sidebar {
            width: 300px;
            background: #1f2833;
            border-left: 2px solid #45f3ff;
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
        }
        .sidebar h2 {
            text-align: center;
            color: #45f3ff;
            margin-bottom: 30px;
            letter-spacing: 2px;
        }
        .menu-btn {
            background: #0b0c10;
            color: #fff;
            border: 1px solid #45f3ff;
            padding: 15px;
            margin-bottom: 15px;
            cursor: pointer;
            border-radius: 5px;
            text-align: left;
            font-size: 16px;
            transition: 0.3s;
        }
        .menu-btn:hover {
            background: #45f3ff;
            color: #0b0c10;
            font-weight: bold;
        }
        /* Zakładki */
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
        /* Styl listy poszukiwanych */
        .poszukiwany-card {
            background: #1f2833;
            border: 1px solid #444;
            padding: 20px;
            margin-bottom: 15px;
            border-radius: 5px;
            position: relative;
        }
        .poszukiwany-card button {
            background: #45f3ff;
            color: #000;
            border: none;
            padding: 8px 15px;
            cursor: pointer;
            font-weight: bold;
            border-radius: 3px;
            margin-top: 10px;
        }
        /* Style Word-Edytora */
        .word-toolbar {
            background: #222;
            padding: 8px;
            border: 1px solid #444;
            border-bottom: none;
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
            border-radius: 5px 5px 0 0;
        }
        .word-toolbar button, .word-toolbar select {
            background: #333;
            color: white;
            border: 1px solid #555;
            padding: 6px 12px;
            cursor: pointer;
            font-weight: bold;
            border-radius: 3px;
        }
        .word-toolbar button:hover {
            background: #45f3ff;
            color: black;
        }
        .word-editor {
            min-height: 150px;
            background: #1a1a1a;
            color: white;
            border: 1px solid #444;
            padding: 15px;
            overflow-y: auto;
            border-radius: 0 0 5px 5px;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

    <div class="main-container">
        
        <div id="tab-taryfikator" class="tab-content active">
            <h1>Taryfikator Wykroczeń</h1>
            <div id="taryfikator-lista">Ładowanie taryfikatora z bazy Supabase...</div>
        </div>

        <div id="tab-notatki" class="tab-content">
            <h1>Notatki Funkcjonariuszy</h1>
            <p>Tutaj pojawią się notatki służbowe.</p>
        </div>

        <div id="tab-mandaty" class="tab-content">
            <h1>Wystawione Mandaty i Wyroki</h1>
            <p>Archiwum wystawionych kar.</p>
        </div>

        <div id="tab-poszukiwania" class="tab-content">
            <h1>System Poszukiwań</h1>
            
            <div style="background: #141d26; padding: 20px; border-radius: 8px; margin-bottom: 30px;">
                <h3>Dodaj nowy wpis o poszukiwanym</h3>
                
                <label>Imię i Nazwisko / Tytuł:</label><br>
                <input type="text" id="poszukiwany-tytul" style="width: 100%; padding: 10px; background: #222; color: white; border: 1px solid #444; margin-bottom: 15px; border-radius: 5px;"><br>

                <label>Szczegóły i opis (Użyj paska narzędzi do formatowania):</label>
                <div class="word-toolbar">
                    <button type="button" onclick="formatuj('bold')">B</button>
                    <button type="button" onclick="formatuj('italic')">I</button>
                    <button type="button" onclick="formatuj('underline')">U</button>
                    
                    <select onchange="formatuj('fontSize', this.value)">
                        <option value="3">Czcionka: Normalna</option>
                        <option value="4">Średnia</option>
                        <option value="5">Duża</option>
                        <option value="6">Ogromna</option>
                    </select>

                    <select onchange="formatuj('foreColor', this.value)">
                        <option value="#ffffff">Kolor: Biały</option>
                        <option value="#ff4d4d">Czerwony</option>
                        <option value="#ffb300">Pomarańczowy</option>
                        <option value="#4dff4d">Zielony</option>
                    </select>

                    <select onchange="formatuj('hiliteColor', this.value)">
                        <option value="transparent">Brak tła</option>
                        <option value="#550000">Czerwone tło</option>
                        <option value="#554400">Żółte tło</option>
                    </select>

                    <button type="button" onclick="formatuj('insertUnorderedList')">• Lista</button>
                </div>
                <div id="wordEditor" class="word-editor" contenteditable="true"></div>

                <button onclick="dodajPoszukiwanie()" style="background: #4dff4d; color: black; border: none; padding: 12px 25px; font-weight: bold; cursor: pointer; border-radius: 5px;">Zapisz w bazie Supabase</button>
            </div>

            <div id="poszukiwani-lista">Ładowanie listy poszukiwanych...</div>
        </div>

    </div>

    <div class="sidebar">
        <h2>MDT MENU</h2>
        <button class="menu-btn" onclick="switchTab('taryfikator')">📋 Taryfikator</button>
        <button class="menu-btn" onclick="switchTab('notatki')">📝 Notatki</button>
        <button class="menu-btn" onclick="switchTab('mandaty')">💵 Mandaty i Wyroki</button>
        <button class="menu-btn" onclick="switchTab('poszukiwania')">🚨 Poszukiwania</button>
    </div>

    <div id="fullscreenModal" style="display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(10, 12, 16, 0.98); z-index: 9999; padding: 45px; box-sizing: border-box; overflow-y: auto;">
        <button onclick="closeFullscreen()" style="position: fixed; top: 20px; right: 20px; background: #ff4d4d; color: white; border: none; padding: 15px 30px; font-size: 18px; cursor: pointer; border-radius: 5px; font-weight: bold; box-shadow: 0 0 15px rgba(255, 77, 77, 0.4);">
            ZAMKNIJ PODGLĄD X
        </button>
        <div id="fullscreenContent" style="max-width: 900px; margin: 60px auto; font-size: 26px; line-height: 1.7; background: #1f2833; padding: 40px; border-radius: 10px; border: 2px solid #45f3ff; box-shadow: 0 0 30px rgba(69, 243, 255, 0.2);">
            </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
